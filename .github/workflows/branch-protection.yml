name: Branch Protection

# Blocks direct pushes to protected branches by non-owners.
# Contributors must open a PR to develop — that is the only writable branch.
# Branch flow enforced: develop → testing → main → production
#
# ALSO REQUIRED in GitHub Settings → Branches:
# Add protection rules for: testing, main, production
# Enable: "Require status checks" → select "Enforce branch protection"
# Enable: "Restrict who can push" → add only the repo owner

on:
  push:
    branches: [testing, main, production]

jobs:
  enforce-pr-only:
    name: Enforce branch protection
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Block direct pushes from non-owners
        run: |
          ACTOR="${{ github.actor }}"
          REPO_OWNER="${{ github.repository_owner }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG=$(git log -1 --pretty=%s)

          echo "Actor  : $ACTOR"
          echo "Owner  : $REPO_OWNER"
          echo "Branch : $BRANCH"
          echo "Commit : $COMMIT_MSG"

          # Repository owner is always allowed (case-insensitive)
          if [ "${ACTOR,,}" = "${REPO_OWNER,,}" ]; then
            echo "Owner push — allowed."
            exit 0
          fi

          # GitHub bots (dependabot, actions) are allowed
          if echo "$ACTOR" | grep -q "\[bot\]"; then
            echo "Bot push — allowed."
            exit 0
          fi

          # PR merges produce a commit starting with "Merge pull request"
          if echo "$COMMIT_MSG" | grep -qE "^Merge pull request"; then
            echo "PR merge — allowed."
            exit 0
          fi

          echo ""
          echo "BLOCKED: Direct push to '$BRANCH' is not allowed for '$ACTOR'."
          echo ""
          echo "Required flow:"
          echo "  1. Work on a feature/* or fix/* branch branched from 'develop'"
          echo "  2. Open a PR targeting 'develop'"
          echo "  3. Owner promotes: develop -> testing -> main -> production"
          echo ""
          exit 1
        shell: bash
