name: CI — Lint, Test, Build

on:
  push:
    branches: [develop, testing, production, main]
  pull_request:
    branches: [develop, testing, production, main]

env:
  NODE_VERSION: '20'

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mero_jugx_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: E2E API Tests
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: mero_jugx_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-32chars-minimum
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars-min
          AUTO_INIT_DB: true
          RUN_MIGRATIONS: true
          RUN_SEEDS: true
          THROTTLE_LIMIT: 1000
          ESEWA_USE_MOCK_MODE: true
        run: npm run test:api

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        run: cd app && npm ci

      - name: Build frontend
        env:
          VITE_API_URL: https://placeholder.railway.app
        run: cd app && npm run build

  build-backend:
    name: Backend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        run: cd api && npm ci

      - name: Build NestJS
        run: cd api && npm run build
