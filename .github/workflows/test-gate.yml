name: Test Gate — Main Branch

# Runs when testing is merged into main.
# Full E2E test suite must pass before production can be deployed.
# If tests fail here, the production deploy does NOT run.

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  full-test-suite:
    name: Full E2E Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mero_jugx_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Auth tests
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: mero_jugx_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32-chars-min
          AUTO_INIT_DB: true
          RUN_MIGRATIONS: true
          RUN_SEEDS: true
          THROTTLE_LIMIT: 1000
          ESEWA_USE_MOCK_MODE: true
        run: npm run test:auth

      - name: Multi-tenancy isolation tests
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: mero_jugx_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32-chars-min
          THROTTLE_LIMIT: 1000
          ESEWA_USE_MOCK_MODE: true
        run: npm run test:tenancy

      - name: RBAC tests
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: mero_jugx_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32-chars-min
          THROTTLE_LIMIT: 1000
          ESEWA_USE_MOCK_MODE: true
        run: npm run test:api -- --testPathPattern=rbac

      - name: Accounting tests (VAT, TDS, double-entry)
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: mero_jugx_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32-chars-min
          THROTTLE_LIMIT: 1000
          ESEWA_USE_MOCK_MODE: true
        run: npm run test:accounting

      - name: Payroll tests (Nepal PF)
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: mero_jugx_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32-chars-min
          THROTTLE_LIMIT: 1000
          ESEWA_USE_MOCK_MODE: true
        run: npm run test:payroll

      - name: Inventory tests
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: mero_jugx_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32-chars-min
          THROTTLE_LIMIT: 1000
          ESEWA_USE_MOCK_MODE: true
        run: npm run test:inventory

      - name: Payments tests
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: mero_jugx_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32-chars-min
          THROTTLE_LIMIT: 1000
          ESEWA_USE_MOCK_MODE: true
        run: npm run test:payments

  notify-success:
    name: Tests Passed — Ready for Production
    runs-on: ubuntu-latest
    needs: full-test-suite

    steps:
      - name: Post summary
        run: |
          echo "## All tests passed on main" >> $GITHUB_STEP_SUMMARY
          echo "Promote main → production to deploy live." >> $GITHUB_STEP_SUMMARY
